<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweeping Area — Gallery Test Harness</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        display: flex;
        height: 100vh;
        font-family: Calibri, sans-serif;
        background: #f0f0f0;
      }

      /* ---- Left column ---- */
      #gallery {
        width: 220px;
        min-width: 220px;
        display: flex;
        flex-direction: column;
        background: #fff;
        border-right: 2px solid #ccc;
      }

      #gallery h2 {
        padding: 12px;
        font-size: 14px;
        font-weight: bold;
        background: #ddd;
        border-bottom: 1px solid #ccc;
        text-align: center;
        letter-spacing: 0.05em;
      }

      #thumbs {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .thumb-entry {
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 4px;
        overflow: hidden;
        background: #eee;
        transition: border-color 0.15s;
      }
      .thumb-entry:hover { border-color: #888; }
      .thumb-entry img { display: block; width: 100%; height: auto; }
      .thumb-entry .thumb-label {
        font-size: 11px;
        color: #555;
        padding: 3px 6px;
        text-align: center;
      }

      #publish-btn {
        margin: 10px;
        padding: 10px;
        font-size: 15px;
        font-weight: bold;
        background: #4a90d9;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      #publish-btn:hover { background: #357abd; }
      #publish-btn:disabled { background: #aaa; cursor: default; }

      /* ---- Right: app iframe ---- */
      #app-frame {
        flex: 1;
        border: none;
      }

      /* ---- Modal ---- */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
      #modal-overlay.visible { display: flex; }

      #modal {
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        max-width: 280px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
      #modal img {
        width: 100%;
        border: 1px solid #ccc;
        margin-bottom: 14px;
        border-radius: 4px;
      }
      #modal .modal-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      #modal button {
        padding: 8px 18px;
        font-size: 14px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
      }
      #modal-load-btn  { background: #4a90d9; color: #fff; }
      #modal-load-btn:hover  { background: #357abd; }
      #modal-close-btn { background: #ccc; }
      #modal-close-btn:hover { background: #aaa; }

      #status {
        font-size: 12px;
        color: #888;
        text-align: center;
        padding: 4px 10px 8px;
      }
    </style>
  </head>
  <body>
    <div id="gallery">
      <h2>GALLERY</h2>
      <div id="thumbs"></div>
      <div id="status">Waiting for app…</div>
      <button id="publish-btn" disabled>Publish</button>
    </div>

    <iframe id="app-frame" src="/"></iframe>

    <!-- Thumbnail preview modal -->
    <div id="modal-overlay">
      <div id="modal">
        <img id="modal-img" src="" alt="State preview" />
        <div class="modal-btns">
          <button id="modal-load-btn">Load into workspace</button>
          <button id="modal-close-btn">Cancel</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/harness.ts"></script>
  </body>
</html>
