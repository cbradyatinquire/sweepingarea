<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweeping Area</title>
    <!-- App HTML injected by build:offline. null = dev mode (uses src="/"). -->
    <script>window.__APP_HTML__ = null;</script>
    <!-- Starter state injected by authoring tool. null = default app startup. -->
    <script>window.__STARTER_STATE__ = null;</script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        display: flex;
        height: 100vh;
        font-family: Calibri, sans-serif;
        background: #f0f0f0;
      }

      /* ---- Left column ---- */
      #gallery {
        width: 200px;
        min-width: 200px;
        display: flex;
        flex-direction: column;
        background: #fff;
        border-right: 2px solid #ccc;
      }

      #gallery-header {
        padding: 8px;
        background: #ddd;
        border-bottom: 1px solid #ccc;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #gallery-header h2 {
        font-size: 13px;
        font-weight: bold;
        text-align: center;
        letter-spacing: 0.05em;
      }


      #thumbs {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .thumb-entry {
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 4px;
        overflow: hidden;
        background: #eee;
        transition: border-color 0.15s;
      }
      .thumb-entry:hover { border-color: #888; }
      .thumb-entry img { display: block; width: 100%; height: auto; }
      .thumb-entry .thumb-label {
        font-size: 11px;
        color: #555;
        padding: 3px 6px;
        text-align: center;
      }

      #status {
        font-size: 11px;
        color: #888;
        text-align: center;
        padding: 3px 8px;
      }

      #publish-btn {
        margin: 8px;
        padding: 10px;
        font-size: 15px;
        font-weight: bold;
        background: #4a90d9;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      #publish-btn:hover    { background: #357abd; }
      #publish-btn:disabled { background: #aaa; cursor: default; }

      /* ---- App iframe ---- */
      #app-frame { flex: 1; border: none; }

      /* ---- Modal ---- */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
      #modal-overlay.visible { display: flex; }
      #modal {
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        max-width: 260px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
      #modal img { width: 100%; border: 1px solid #ccc; margin-bottom: 14px; border-radius: 4px; }
      #modal .modal-btns { display: flex; gap: 10px; justify-content: center; }
      #modal button { padding: 8px 16px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; }
      #modal-load-btn  { background: #4a90d9; color: #fff; }
      #modal-load-btn:hover  { background: #357abd; }
      #modal-close-btn { background: #ccc; }
      #modal-close-btn:hover { background: #aaa; }
    </style>
  </head>
  <body>
    <div id="gallery">
      <div id="gallery-header">
        <h2>MY WORK</h2>
      </div>
      <div id="thumbs"></div>
      <div id="status">Waiting for app…</div>
      <button id="publish-btn" disabled>Save My Work</button>
    </div>

    <!-- src set by offline.ts: srcdoc in standalone mode, src="/" in dev mode -->
    <iframe id="app-frame"></iframe>

    <div id="modal-overlay">
      <div id="modal">
        <img id="modal-img" src="" alt="Saved state" />
        <div class="modal-btns">
          <button id="modal-load-btn">Load this</button>
          <button id="modal-close-btn">Cancel</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/offline.ts"></script>
  </body>
</html>
